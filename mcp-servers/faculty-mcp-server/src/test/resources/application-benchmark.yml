spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/faculty_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  ai:
    ollama:
      base-url: ${OLLAMA_URL:http://localhost:11434}

    mcp:
      server:
        instructions: "Benchmark profile — MCP instructions not needed"

  jpa:
    hibernate:
      ddl-auto: validate

storage:
  documents:
    path: ${DOCUMENTS_STORAGE_ROOT_PATH:/tmp/faculty-documents}

benchmark:
  similarity-threshold: 0.3
