spring:
  application:
    name: faculty-mcp-server

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  liquibase:
    changelog: classpath:/db/changelog/changelog-master.xml

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  mvc:
    servlet:
      path: /v1/api

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

  ai:
    mcp:
      server:
        name: faculty-mcp-server
        version: 1.0.0
        annotation-scanner:
          enabled: true
        protocol: streamable
        streamable-http:
          mcp-endpoint: /mcp

    model:
      embedding: none

    ollama:
      base-url: ${OLLAMA_URL:http://localhost:11434}

storage:
  documents:
    path: ${DOCUMENTS_STORAGE_ROOT_PATH:/tmp/faculty-documents}

springdoc:
  swagger-ui:
    path: /swagger-ui.html